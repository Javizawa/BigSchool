openapi: 3.1.0
info:
  title: Love4Sneakers API
  version: 0.2.0
  description: |
    API REST para la tienda online de zapatillas Love4Sneakers.

    ## Stack
    - **Backend**: NestJS (Node.js + TypeScript)
    - **Base de datos**: Supabase (PostgreSQL gestionado)
    - **Imágenes**: Cloudinary (CDN + transformaciones on-the-fly)
    - **Pagos**: Stripe

    ## Autenticación
    Gestionada por **Supabase Auth** en el cliente Angular (email/password y Google OAuth).
    El cliente obtiene un JWT de Supabase y lo envía como `Authorization: Bearer <token>`.
    NestJS valida el JWT contra la clave pública de Supabase — no genera tokens propios.

    ## Roles
    - `USER` — usuario registrado (asignado por defecto)
    - `ADMIN` — acceso completo incluyendo rutas `/admin/*`

    ## Imágenes (Cloudinary)
    Todas las URLs de imagen son URLs de Cloudinary.
    Transformaciones on-the-fly: añadir parámetros en la URL → `f_auto,q_auto,w_400`.

    ## Flujo de pago (Stripe)
    1. `POST /orders` → crea pedido en estado `pending_payment`
    2. `POST /payments/intent` → crea PaymentIntent, devuelve `clientSecret`
    3. Frontend completa pago con Stripe.js
    4. `POST /webhooks/stripe` → actualiza estado del pedido a `confirmed`
  contact:
    email: javiersalvadormarco@gmail.com

servers:
  - url: http://localhost:3000/api/v1
    description: Desarrollo local
  - url: https://bigschool-production.up.railway.app/api/v1
    description: Producción

tags:
  - name: auth
    description: Sincronización de usuario con Supabase Auth
  - name: users
    description: Perfil y datos del usuario autenticado
  - name: products
    description: Catálogo de zapatillas (público)
  - name: categories
    description: Categorías (público)
  - name: brands
    description: Marcas (público)
  - name: wishlist
    description: Lista de deseos
  - name: reviews
    description: Valoraciones de productos
  - name: cart
    description: Carrito de compra
  - name: coupons
    description: Cupones de descuento
  - name: payments
    description: Pagos con Stripe
  - name: orders
    description: Pedidos y checkout
  - name: returns
    description: Devoluciones
  - name: size-guide
    description: Guía de tallas (público)
  - name: newsletter
    description: Boletín de novedades
  - name: admin
    description: Panel de administración (requiere rol ADMIN)
  - name: webhooks
    description: Webhooks de servicios externos
  - name: agent
    description: Asistente conversacional impulsado por IA (Groq + Llama 3.3 70B)

paths:

  # ===========================================================================
  # AUTH
  # ===========================================================================

  /auth/me:
    get:
      tags: [auth]
      summary: Sincronizar usuario Supabase con nuestra BD
      description: |
        Llamar tras el primer login. Crea o actualiza el registro del usuario
        en nuestra base de datos a partir del JWT de Supabase.
        Registro, login, logout y OAuth con Google se gestionan directamente
        en el cliente con el SDK de Supabase — no exponen endpoints aquí.
      operationId: syncAuthUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Usuario sincronizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ===========================================================================
  # USERS
  # ===========================================================================

  /users/me:
    get:
      tags: [users]
      summary: Obtener perfil propio
      operationId: getMyProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [users]
      summary: Actualizar perfil propio
      operationId: updateMyProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Perfil actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users/me/addresses:
    get:
      tags: [users]
      summary: Listar mis direcciones de envío
      operationId: listMyAddresses
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Direcciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [users]
      summary: Añadir dirección de envío
      operationId: createAddress
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
      responses:
        '201':
          description: Dirección creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users/me/addresses/{addressId}:
    parameters:
      - $ref: '#/components/parameters/AddressId'
    patch:
      tags: [users]
      summary: Actualizar dirección
      operationId: updateAddress
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressRequest'
      responses:
        '200':
          description: Dirección actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Address'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [users]
      summary: Eliminar dirección
      operationId: deleteAddress
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Dirección eliminada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me/stock-notifications:
    get:
      tags: [users]
      summary: Listar mis suscripciones de disponibilidad de stock
      operationId: listMyStockNotifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Suscripciones activas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StockNotification'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ===========================================================================
  # CATEGORIES (público)
  # ===========================================================================

  /categories:
    get:
      tags: [categories]
      summary: Listar categorías
      operationId: listCategories
      responses:
        '200':
          description: Categorías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

  /categories/{categoryId}:
    parameters:
      - $ref: '#/components/parameters/CategoryId'
    get:
      tags: [categories]
      summary: Detalle de categoría
      operationId: getCategoryById
      responses:
        '200':
          description: Categoría
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # BRANDS (público)
  # ===========================================================================

  /brands:
    get:
      tags: [brands]
      summary: Listar marcas
      operationId: listBrands
      responses:
        '200':
          description: Marcas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Brand'

  /brands/{brandId}:
    parameters:
      - $ref: '#/components/parameters/BrandId'
    get:
      tags: [brands]
      summary: Detalle de marca
      operationId: getBrandById
      responses:
        '200':
          description: Marca
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Brand'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # PRODUCTS (público)
  # ===========================================================================

  /products:
    get:
      tags: [products]
      summary: Listar productos con filtros y paginación
      operationId: listProducts
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: categoryId
          in: query
          schema: { type: string, format: uuid }
        - name: brandId
          in: query
          schema: { type: string, format: uuid }
        - name: gender
          in: query
          schema:
            $ref: '#/components/schemas/Gender'
        - name: minPrice
          in: query
          schema: { type: number, minimum: 0 }
        - name: maxPrice
          in: query
          schema: { type: number }
        - name: size
          in: query
          schema: { type: number }
          description: Filtrar por talla EU disponible en stock
        - name: color
          in: query
          schema: { type: string }
        - name: search
          in: query
          schema: { type: string }
          description: Búsqueda por nombre o descripción
        - name: onSale
          in: query
          schema: { type: boolean }
          description: Solo productos en oferta
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, newest, popularity, rating]
            default: newest
      responses:
        '200':
          description: Productos paginados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductPage'

  /products/{productId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [products]
      summary: Detalle de producto (con variantes y SEO)
      operationId: getProductById
      responses:
        '200':
          description: Producto detallado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDetail'
        '404':
          $ref: '#/components/responses/NotFound'

  /products/{productId}/related:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [products]
      summary: Productos relacionados
      operationId: getRelatedProducts
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 20, default: 8 }
      responses:
        '200':
          description: Productos relacionados
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'

  /products/{productId}/reviews:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [reviews]
      summary: Listar valoraciones del producto
      operationId: listProductReviews
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [newest, highest_rating, lowest_rating, most_helpful]
            default: newest
      responses:
        '200':
          description: Valoraciones paginadas con resumen estadístico
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewPage'
    post:
      tags: [reviews]
      summary: Publicar valoración
      description: El usuario debe haber comprado el producto (compra verificada).
      operationId: createReview
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '201':
          description: Valoración publicada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /products/{productId}/variants/{variantId}/notify-stock:
    parameters:
      - $ref: '#/components/parameters/ProductId'
      - $ref: '#/components/parameters/VariantId'
    post:
      tags: [products]
      summary: Suscribirse a notificación de disponibilidad
      operationId: subscribeStockNotification
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Suscripción creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockNotification'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [products]
      summary: Cancelar suscripción de disponibilidad
      operationId: unsubscribeStockNotification
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Suscripción cancelada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # REVIEWS (gestión propia)
  # ===========================================================================

  /reviews/{reviewId}:
    parameters:
      - $ref: '#/components/parameters/ReviewId'
    patch:
      tags: [reviews]
      summary: Editar mi valoración
      operationId: updateReview
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
      responses:
        '200':
          description: Valoración actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [reviews]
      summary: Eliminar mi valoración
      operationId: deleteReview
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Valoración eliminada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # WISHLIST
  # ===========================================================================

  /users/me/wishlist:
    get:
      tags: [wishlist]
      summary: Obtener mi lista de deseos
      operationId: getWishlist
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de deseos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WishlistItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [wishlist]
      summary: Añadir producto a la lista de deseos
      operationId: addToWishlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId]
              properties:
                productId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Producto añadido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WishlistItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /users/me/wishlist/{productId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    delete:
      tags: [wishlist]
      summary: Eliminar producto de la lista de deseos
      operationId: removeFromWishlist
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Eliminado de la lista de deseos
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # SIZE GUIDE (público)
  # ===========================================================================

  /size-guide:
    get:
      tags: [size-guide]
      summary: Guía de tallas general
      operationId: getGlobalSizeGuide
      responses:
        '200':
          description: Tabla de conversión EU / US / UK / CM
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SizeGuide'

  /size-guide/{categoryId}:
    parameters:
      - $ref: '#/components/parameters/CategoryId'
    get:
      tags: [size-guide]
      summary: Guía de tallas por categoría
      operationId: getSizeGuideByCategory
      responses:
        '200':
          description: Guía específica para la categoría
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SizeGuide'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # CART
  # ===========================================================================

  /cart:
    get:
      tags: [cart]
      summary: Obtener carrito actual
      operationId: getCart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Carrito con ítems, totales y cupón aplicado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [cart]
      summary: Vaciar carrito
      operationId: clearCart
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Carrito vaciado
        '401':
          $ref: '#/components/responses/Unauthorized'

  /cart/items:
    post:
      tags: [cart]
      summary: Añadir ítem al carrito
      operationId: addCartItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCartItemRequest'
      responses:
        '200':
          description: Carrito actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /cart/items/{itemId}:
    parameters:
      - $ref: '#/components/parameters/CartItemId'
    patch:
      tags: [cart]
      summary: Actualizar cantidad de un ítem
      operationId: updateCartItem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartItemRequest'
      responses:
        '200':
          description: Carrito actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [cart]
      summary: Eliminar ítem del carrito
      operationId: removeCartItem
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Carrito actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # COUPONS
  # ===========================================================================

  /coupons/validate:
    post:
      tags: [coupons]
      summary: Validar cupón de descuento
      operationId: validateCoupon
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateCouponRequest'
      responses:
        '200':
          description: Resultado de validación (válido o no, con motivo)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateCouponResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ===========================================================================
  # PAYMENTS (Stripe)
  # ===========================================================================

  /payments/intent:
    post:
      tags: [payments]
      summary: Crear PaymentIntent de Stripe
      description: |
        Crea un PaymentIntent en Stripe asociado al pedido indicado.
        El cliente usa el `clientSecret` con Stripe.js para completar el pago.
        Al confirmar el pago, Stripe notifica mediante webhook a `POST /webhooks/stripe`.
      operationId: createPaymentIntent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentIntentRequest'
      responses:
        '201':
          description: PaymentIntent creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # ORDERS
  # ===========================================================================

  /orders:
    get:
      tags: [orders]
      summary: Listar mis pedidos
      operationId: listMyOrders
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: Pedidos paginados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [orders]
      summary: Crear pedido (checkout)
      description: Crea pedido en estado `pending_payment`. A continuación llamar a `POST /payments/intent`.
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Pedido creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /orders/{orderId}:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    get:
      tags: [orders]
      summary: Detalle de pedido
      operationId: getOrderById
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /orders/{orderId}/cancel:
    parameters:
      - $ref: '#/components/parameters/OrderId'
    post:
      tags: [orders]
      summary: Cancelar pedido
      operationId: cancelOrder
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pedido cancelado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ===========================================================================
  # RETURNS
  # ===========================================================================

  /orders/{orderId}/return:
    parameters:
      - $ref: '#/components/parameters/OrderId'
