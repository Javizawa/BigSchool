  # ===========================================================================
  # WEBHOOKS
  # ===========================================================================

  /webhooks/stripe:
    post:
      tags: [webhooks]
      summary: Webhook de Stripe
      description: |
        Recibe eventos de Stripe. La autenticación se realiza verificando
        el header `Stripe-Signature` con el webhook secret — no requiere JWT.

        Eventos procesados:
        - `payment_intent.succeeded` → pedido pasa a `confirmed`
        - `payment_intent.payment_failed` → pedido pasa a `payment_failed`
        - `charge.refunded` → devolución pasa a `refunded`
      operationId: stripeWebhook
      parameters:
        - name: Stripe-Signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Evento de Stripe (estructura variable según tipo)
      responses:
        '200':
          description: Evento procesado correctamente
        '400':
          description: Firma inválida o evento no reconocido

