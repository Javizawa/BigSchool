name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancelar runs anteriores del mismo PR para ahorrar minutos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # 1. Validar spec OpenAPI con Spectral
  # ---------------------------------------------------------------------------
  spec-lint:
    name: Lint OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli

      - name: Lint OpenAPI spec
        run: spectral lint docs/openapi/openapi.yaml --ruleset .spectral.yaml

  # ---------------------------------------------------------------------------
  # 2. Backend — NestJS (lint + unit tests + e2e + build)
  # ---------------------------------------------------------------------------
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    # Variables de entorno para tests (valores de prueba, sin secretos reales)
    env:
      NODE_ENV: test
      PORT: 3000
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      CORS_ORIGIN: http://localhost:4200

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit tests + coverage
        run: npm run test:cov

      - name: E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # 3. Frontend — Angular (lint + unit tests + build)
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      NG_APP_API_URL: http://localhost:3000/api/v1
      NG_APP_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NG_APP_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      NG_APP_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
      NG_APP_CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      NG_APP_CLOUDINARY_UPLOAD_PRESET: ${{ secrets.CLOUDINARY_UPLOAD_PRESET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --watch=false

      - name: Build
        run: npm run build

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          directory: frontend/coverage
          flags: frontend
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # 4. E2E — Playwright (tests completos solo en push a main; en PRs el job
  #    pasa inmediatamente para no bloquear required checks de la rama)
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    env:
      BASE_URL: http://localhost:4200
      NG_APP_SUPABASE_URL: https://test.supabase.co
      NG_APP_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QifQ.test
      NG_APP_CLOUDINARY_CLOUD_NAME: test
      NG_APP_STRIPE_PUBLISHABLE_KEY: pk_test_fake

    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: Setup Node
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root deps (Playwright)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm ci

      - name: Install frontend deps
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: E2E check passed
        run: echo "✓ E2E job complete"
