<header class="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <!-- Logo -->
      <a routerLink="/"><app-logo /></a>

      <!-- Nav -->
      <nav class="hidden md:flex items-center gap-6 text-sm font-medium text-gray-600">
        <a routerLink="/products" routerLinkActive="text-indigo-600" class="hover:text-indigo-600 transition-colors">Productos</a>
        <a routerLink="/products" [queryParams]="{gender: 'man'}" class="hover:text-indigo-600 transition-colors">Hombre</a>
        <a routerLink="/products" [queryParams]="{gender: 'woman'}" class="hover:text-indigo-600 transition-colors">Mujer</a>
        <a routerLink="/products" [queryParams]="{onSale: true}" class="hover:text-red-600 transition-colors text-red-500 font-semibold">Sale</a>
      </nav>

      <!-- Actions -->
      <div class="flex items-center gap-3">
        <!-- Cart (hidden for admin) -->
        @if (!auth.isAdmin()) {
          <a routerLink="/cart" class="relative p-2 rounded-lg hover:bg-gray-100 transition-colors">
            <svg class="w-5 h-5 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
            </svg>
            @if (cart.itemCount() > 0) {
              <span class="absolute -top-1 -right-1 bg-indigo-600 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">
                {{ cart.itemCount() }}
              </span>
            }
          </a>
        }

        @if (auth.isAuthenticated()) {
          @if (auth.isAdmin()) {
            <!-- Admin: solo enlace al panel y botón de salir -->
            <a routerLink="/admin" class="text-sm font-semibold text-indigo-600 hover:text-indigo-800 transition-colors">Panel admin</a>
          } @else {
            <!-- User: perfil -->
            <a routerLink="/user/profile" class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
              <svg class="w-5 h-5 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </a>
          }
          <button (click)="auth.signOut()" class="text-sm text-gray-500 hover:text-gray-800 transition-colors">Salir</button>
        } @else {
          <a routerLink="/auth/login"
             class="text-sm font-medium text-gray-700 hover:text-indigo-600 transition-colors">Entrar</a>
          <a routerLink="/auth/register"
             class="text-sm font-semibold bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg transition-colors">
            Registrarse
          </a>
        }
      </div>
    </div>
  </div>
</header>
