<!-- Botón flotante -->
<button
  (click)="toggle()"
  class="fixed bottom-6 right-6 z-50 flex items-center justify-center w-14 h-14 rounded-full bg-indigo-600 text-white shadow-lg hover:bg-indigo-700 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
  [attr.aria-label]="isOpen() ? 'Cerrar asistente' : 'Abrir asistente'"
>
  @if (isOpen()) {
    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
    </svg>
  } @else {
    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
    </svg>
  }
</button>

<!-- Panel del chat -->
@if (isOpen()) {
  <div class="fixed bottom-24 right-6 z-50 w-80 sm:w-96 flex flex-col rounded-2xl shadow-2xl bg-white border border-gray-200 overflow-hidden"
       style="max-height: 520px;">

    <!-- Cabecera -->
    <div class="flex items-center gap-3 px-4 py-3 bg-indigo-600 text-white">
      <div class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2a10 10 0 110 20A10 10 0 0112 2zm0 2a8 8 0 100 16A8 8 0 0012 4zm-1 11h2v2h-2v-2zm0-8h2v6h-2V7z"/>
        </svg>
      </div>
      <div>
        <p class="text-sm font-semibold leading-none">Asistente BigSchool</p>
        <p class="text-xs text-indigo-200 mt-0.5">Powered by IA · Llama 3.1</p>
      </div>
    </div>

    <!-- Mensajes -->
    <div #messagesContainer class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50" style="min-height: 200px; max-height: 340px;">

      @if (!hasMessages()) {
        <!-- Estado vacío con sugerencias -->
        <div class="text-center py-4">
          <p class="text-sm text-gray-500 mb-3">¡Hola! ¿En qué puedo ayudarte hoy?</p>
          <div class="flex flex-col gap-2">
            @for (s of suggestions; track s) {
              <button
                (click)="useSuggestion(s)"
                class="text-xs text-left px-3 py-2 rounded-lg bg-white border border-indigo-200 text-indigo-700 hover:bg-indigo-50 transition-colors"
              >
                {{ s }}
              </button>
            }
          </div>
        </div>
      }

      @for (msg of messages(); track msg.timestamp) {
        <div [class]="msg.role === 'user' ? 'flex justify-end' : 'flex justify-start'">
          @if (msg.role === 'user') {
            <div class="max-w-[85%] px-3 py-2 rounded-2xl rounded-br-sm bg-indigo-600 text-white text-sm">
              {{ msg.text }}
            </div>
          } @else {
            <div
              class="max-w-[85%] px-3 py-2 rounded-2xl rounded-bl-sm bg-white border border-gray-200 text-gray-800 text-sm chat-markdown"
              [innerHTML]="msg.html ?? msg.text"
              tabindex="0"
              (click)="handleMarkdownClick($event)"
              (keydown)="handleMarkdownClick($event)"
            ></div>
          }
        </div>
      }

      @if (loading()) {
        <div class="flex justify-start">
          <div class="px-3 py-2 rounded-2xl rounded-bl-sm bg-white border border-gray-200">
            <div class="flex gap-1 items-center h-4">
              <span class="w-2 h-2 rounded-full bg-indigo-400 animate-bounce" style="animation-delay: 0ms"></span>
              <span class="w-2 h-2 rounded-full bg-indigo-400 animate-bounce" style="animation-delay: 150ms"></span>
              <span class="w-2 h-2 rounded-full bg-indigo-400 animate-bounce" style="animation-delay: 300ms"></span>
            </div>
          </div>
        </div>
      }
    </div>

    <!-- Input -->
    <div class="flex items-end gap-2 p-3 border-t border-gray-200 bg-white">
      <textarea
        rows="1"
        class="flex-1 resize-none rounded-xl border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-gray-400"
        placeholder="Escribe tu mensaje..."
        [value]="inputText()"
        (input)="inputText.set($any($event.target).value)"
        (keydown)="handleKey($event)"
        [disabled]="loading()"
      ></textarea>
      <button
        (click)="send()"
        [disabled]="!inputText().trim() || loading()"
        class="flex-shrink-0 flex items-center justify-center w-9 h-9 rounded-xl bg-indigo-600 text-white hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
        aria-label="Enviar"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
        </svg>
      </button>
    </div>
  </div>
}
